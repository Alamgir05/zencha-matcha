<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — ZENCHA | Premium Japanese Matcha</title>
  <meta name="description" content="Browse our full collection of ceremonial-grade Japanese matcha, starter kits, and accessories." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Products page specific ─────────────────────── */
    .page-hero {
      background: var(--clr-dark);
      padding: calc(var(--nav-h) + 60px) clamp(20px, 4vw, 60px) 60px;
      text-align: center;
    }
    .page-hero .section-eyebrow { color: rgba(255,255,255,0.45); margin-bottom: 16px; }
    .page-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 900;
      color: var(--clr-white);
      line-height: 1.1;
    }
    .page-hero h1 em { font-style: italic; font-weight: 400; color: var(--clr-lime); }
    .page-hero p { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-top: 14px; }

    .products-page { padding: clamp(40px, 6vw, 80px) clamp(20px, 4vw, 60px); background: var(--clr-cream); }
    .products-page-inner { max-width: var(--max-w); margin: 0 auto; }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .filter-btn {
      font-family: var(--font-sans); font-size: 0.78rem; font-weight: 500;
      padding: 8px 20px; border-radius: var(--radius-pill);
      border: 1.5px solid rgba(0,0,0,0.12);
      background: transparent; color: var(--clr-text-light);
      cursor: pointer; transition: all var(--ease);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--clr-dark); color: var(--clr-white); border-color: var(--clr-dark);
    }

    /* Product grid */
    .products-api-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--clr-white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow-card);
      transition: transform var(--ease), box-shadow var(--ease);
      display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }

    .product-card-img {
      height: 220px; overflow: hidden; background: var(--clr-cream-deep);
      display: flex; align-items: center; justify-content: center;
    }
    .product-card-img img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      transition: transform var(--ease-slow);
    }
    .product-card:hover .product-card-img img { transform: scale(1.06); }

    .product-card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .product-card-category {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--clr-green-soft); background: rgba(45,90,61,0.1);
      padding: 3px 8px; border-radius: var(--radius-pill); width: fit-content;
    }
    .product-card-name { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700; color: var(--clr-charcoal); line-height: 1.2; }
    .product-card-desc { font-size: 0.78rem; line-height: 1.6; color: var(--clr-text-light); flex: 1; }
    .product-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 12px; }
    .product-card-price { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; color: var(--clr-charcoal); }
    .product-card-price small { font-family: var(--font-sans); font-size: 0.7rem; font-weight: 400; color: var(--clr-text-light); }

    .btn-add-card {
      background: var(--clr-dark); color: var(--clr-white);
      font-family: var(--font-sans); font-size: 0.78rem; font-weight: 600;
      padding: 9px 18px; border: none; border-radius: var(--radius-pill);
      cursor: pointer; transition: background var(--ease), transform var(--ease);
      white-space: nowrap;
    }
    .btn-add-card:hover:not(:disabled) { background: var(--clr-dark-soft); transform: translateY(-1px); }
    .btn-add-card:disabled { opacity: 0.6; cursor: not-allowed; }

    /* States */
    .state-loading, .state-empty, .state-error {
      text-align: center; padding: 80px 20px;
      font-family: var(--font-serif); color: var(--clr-text-light);
    }
    .state-loading { font-size: 1rem; letter-spacing: 0.1em; }
    .state-empty h3, .state-error h3 { font-size: 1.6rem; color: var(--clr-charcoal); margin-bottom: 10px; }
    .state-empty p, .state-error p  { font-size: 0.85rem; }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(0,0,0,0.1);
      border-top-color: var(--clr-dark); border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .products-api-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV (matches index.html) -->
  <header class="site-header" id="site-header">
    <nav class="nav-inner">
      <a href="/" class="wordmark">ZENCHA</a>
      <ul class="nav-links" id="main-nav">
        <li><a href="/"              class="nav-link">Home</a></li>
        <li><a href="/products.html" class="nav-link active">Products</a></li>
        <li><a href="/#testimonials" class="nav-link">Testimonial</a></li>
      </ul>
      <div class="nav-utilities">
        <a href="#" class="nav-util" id="sign-in-link">Sign In</a>
        <a href="/cart.html" class="cart-btn" id="cart-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-text">My Cart</span> <span class="cart-count" id="cart-count">0</span>
        </a>
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </header>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <div class="section-eyebrow">Our Collection</div>
    <h1>Discover the World<br><em>of Matcha</em></h1>
    <p>Sourced from Uji, Kyoto — the finest ceremonial-grade matcha available.</p>
  </section>

  <!-- PRODUCTS SECTION -->
  <section class="products-page">
    <div class="products-page-inner">

      <!-- Filter bar -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">All Products</button>
        <button class="filter-btn" data-filter="matcha">Matcha</button>
        <button class="filter-btn" data-filter="accessories">Accessories</button>
      </div>

      <!-- Grid -->
      <div id="products-grid">
        <!-- Loaded via JS -->
        <div class="state-loading">
          <div class="spinner"></div>
          Loading products…
        </div>
      </div>

    </div>
  </section>

  <!-- AUTH MODAL (same as index.html) -->
  <div class="auth-overlay" id="auth-overlay" style="display:none;" aria-modal="true" role="dialog">
    <div class="auth-modal" id="auth-modal">
      <button class="auth-close" id="auth-close" aria-label="Close">✕</button>
      <div class="auth-header">
        <div class="auth-logo">ZENCHA</div>
        <h2 id="auth-title">Welcome back</h2>
        <p id="auth-subtitle">Sign in to your account</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" data-mode="login">Sign In</button>
        <button class="auth-tab" id="tab-signup" data-mode="signup">Sign Up</button>
      </div>
      <form class="auth-form" id="auth-form" novalidate>
        <div class="auth-field" id="field-name" style="display:none;">
          <label for="auth-name">Full Name</label>
          <input type="text" id="auth-name" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="auth-field">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="Min 6 characters" autocomplete="current-password" required />
        </div>
        <div class="auth-error" id="auth-error" style="display:none;"></div>
        <button type="submit" class="auth-submit" id="auth-submit">Sign In</button>
      </form>
      <p class="auth-switch">
        <span id="auth-switch-text">Don't have an account?</span>
        <button id="auth-switch-btn">Sign up</button>
      </p>
    </div>
  </div>

  <script type="module">
    import { API, getToken, isLoggedIn } from '/shared.js';

    const grid = document.getElementById('products-grid');
    let allProducts = [];
    let activeFilter = 'all';

    // ── Fetch products from backend ───────────────────────
    async function fetchProducts() {
      try {
        const res = await fetch(API + '/api/products');
        if (!res.ok) throw new Error('Failed to fetch products');
        allProducts = await res.json();
        renderProducts(allProducts);
      } catch (err) {
        console.error('Products fetch error:', err.message);
        grid.innerHTML = `
          <div class="state-error">
            <h3>Couldn't load products</h3>
            <p>Make sure the backend is running at localhost:5000</p>
          </div>`;
      }
    }

    // ── Render product cards ──────────────────────────────
    function renderProducts(products) {
      if (!products.length) {
        grid.innerHTML = `<div class="state-empty"><h3>No products found</h3><p>Try a different filter.</p></div>`;
        return;
      }

      grid.innerHTML = '';
      grid.className = 'products-api-grid';

      products.forEach(function(p) {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.dataset.category = p.category || 'matcha';

        card.innerHTML = `
          <div class="product-card-img">
            <img src="${p.image || '/ceremonial_matcha.png'}" alt="${p.name}" loading="lazy"
                 onerror="this.src='/ceremonial_matcha.png'" />
          </div>
          <div class="product-card-body">
            <span class="product-card-category">${p.category || 'matcha'}</span>
            <h2 class="product-card-name">${p.name}</h2>
            <p class="product-card-desc">${p.description || 'Premium quality matcha from Uji, Kyoto.'}</p>
            <div class="product-card-footer">
              <span class="product-card-price">$${p.price} <small>/ ${p.stock > 0 ? p.stock + ' in stock' : 'Limited'}</small></span>
              <button class="btn-add-card" data-product-id="${p._id}">Add to Cart</button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      // Wire add to cart buttons
      grid.querySelectorAll('.btn-add-card').forEach(function(btn) {
        btn.addEventListener('click', handleAddToCart);
      });
    }

    // ── Add to Cart ───────────────────────────────────────
    async function handleAddToCart(e) {
      const btn       = e.currentTarget;
      const productId = btn.dataset.productId;
      const token     = getToken();

      if (!token) {
        // Open sign in modal
        document.getElementById('sign-in-link').click();
        return;
      }

      if (!btn.dataset.orig) btn.dataset.orig = btn.textContent;
      btn.textContent = 'Adding...';
      btn.disabled    = true;

      try {
        const res = await fetch(API + '/api/cart/add', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ productId, quantity: 1 })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        console.log('Added to cart:', data);

        // Update badge
        const total = (data.items || []).reduce((s, i) => s + i.quantity, 0);
        const badge = document.getElementById('cart-count');
        if (badge) badge.textContent = total;

        btn.textContent = '✓ Added!';
        btn.style.background = '#2d5a3d';
        setTimeout(function() {
          btn.textContent = btn.dataset.orig;
          btn.style.background = '';
          btn.disabled = false;
        }, 1800);

      } catch (err) {
        console.error('Add to cart error:', err.message);
        btn.textContent = btn.dataset.orig;
        btn.disabled = false;
      }
    }

    // ── Filter buttons ────────────────────────────────────
    document.getElementById('filter-bar').addEventListener('click', function(e) {
      if (!e.target.matches('.filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.filter;
      const filtered = activeFilter === 'all'
        ? allProducts
        : allProducts.filter(p => (p.category || 'matcha') === activeFilter);
      renderProducts(filtered);
    });

    // ── Hamburger menu ────────────────────────────────────
    const hamburger = document.getElementById('hamburger-btn');
    const navLinks  = document.getElementById('main-nav');
    if (hamburger) {
      hamburger.addEventListener('click', function() {
        navLinks.classList.toggle('is-open');
        hamburger.classList.toggle('is-active');
      });
    }

    // ── Auth modal (same as index.html) ──────────────────
    const overlay   = document.getElementById('auth-overlay');
    const signInBtn = document.getElementById('sign-in-link');
    const closeBtn  = document.getElementById('auth-close');
    const form      = document.getElementById('auth-form');
    const tabLogin  = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const switchBtn = document.getElementById('auth-switch-btn');
    const fieldName = document.getElementById('field-name');
    const errorBox  = document.getElementById('auth-error');
    const submitBtn = document.getElementById('auth-submit');
    let authMode    = 'login';

    if (signInBtn) signInBtn.addEventListener('click', e => { e.preventDefault(); overlay.style.display = 'flex'; });
    if (closeBtn)  closeBtn.addEventListener('click', () => { overlay.style.display = 'none'; form.reset(); });
    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.style.display = 'none'; form.reset(); }});

    function setAuthMode(m) {
      authMode = m;
      if (m === 'login') {
        tabLogin.classList.add('active'); tabSignup.classList.remove('active');
        fieldName.style.display = 'none';
        document.getElementById('auth-title').textContent    = 'Welcome back';
        document.getElementById('auth-subtitle').textContent = 'Sign in to your account';
        submitBtn.textContent = 'Sign In';
        document.getElementById('auth-switch-text').textContent = "Don't have an account?";
        switchBtn.textContent = 'Sign up';
      } else {
        tabSignup.classList.add('active'); tabLogin.classList.remove('active');
        fieldName.style.display = '';
        document.getElementById('auth-title').textContent    = 'Create account';
        document.getElementById('auth-subtitle').textContent = 'Join the matcha ritual';
        submitBtn.textContent = 'Create Account';
        document.getElementById('auth-switch-text').textContent = 'Already have an account?';
        switchBtn.textContent = 'Sign in';
      }
    }

    tabLogin.addEventListener('click', () => setAuthMode('login'));
    tabSignup.addEventListener('click', () => setAuthMode('signup'));
    switchBtn.addEventListener('click', () => setAuthMode(authMode === 'login' ? 'signup' : 'login'));

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorBox.style.display = 'none';
      const email    = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const name     = document.getElementById('auth-name').value.trim();
      if (!email || !password) { errorBox.textContent = 'Email and password required'; errorBox.style.display = ''; return; }
      submitBtn.disabled = true; submitBtn.textContent = 'Please wait...';
      try {
        const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/signup';
        const body     = authMode === 'login' ? { email, password } : { name, email, password };
        const res  = await fetch(API + endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) { errorBox.textContent = data.message || 'Error'; errorBox.style.display = ''; return; }
        localStorage.setItem('zenchaToken', data.token);
        localStorage.setItem('zenchaUser', JSON.stringify({ name: data.name, email: data.email, isAdmin: data.isAdmin }));
        location.reload();
      } catch(err) {
        errorBox.textContent = 'Cannot connect to server'; errorBox.style.display = '';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
      }
    });

    // ── Boot ─────────────────────────────────────────────
    fetchProducts();
  </script>
</body>
</html>
